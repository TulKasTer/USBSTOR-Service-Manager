name: Build and Release

on:
  push:
    tags:
      - 'v*'   # Triggered by tags like v1.0.0, v2.3.1, etc.

jobs:

  # ─────────────────────────────────────────────
  # TEST + BUILD (cross-compile Windows .exe from Linux)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows (.exe)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64 make

      - name: Verify compiler
        run: x86_64-w64-mingw32-gcc --version

      - name: Build (cross-compile Windows exe)
        run: |
          # Force cross-compile to avoid building with native gcc (linux), which lacks windows.h
          make clean || true
          make CC=x86_64-w64-mingw32-gcc PROG_BASE=USBSTORServiceManager

      - name: Test (if available)
        run: |
          make test || true

      - name: Rename artifact
        run: |
          if [ -f USBSTORServiceManager.exe ]; then mv USBSTORServiceManager.exe USBSTORServiceManager-windows-amd64.exe; fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: USBSTORServiceManager-windows-amd64.exe


  # ─────────────────────────────────────────────
  # BUILD ON WINDOWS RUNNER (native build)
  # ─────────────────────────────────────────────
  build-windows-native:
    name: Build Windows (native)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build on Windows
        shell: powershell
        run: |
          Write-Host "Checking for compilers..."
          if (Get-Command cl -ErrorAction SilentlyContinue) {
            Write-Host "Building with MSVC (cl)..."
            cl /nologo /O2 USBSTORServiceManager.c advapi32.lib
            if (Test-Path .\USBSTORServiceManager.exe) { Rename-Item .\USBSTORServiceManager.exe USBSTORServiceManager-windows-amd64.exe }
          } elseif (Get-Command gcc -ErrorAction SilentlyContinue) {
            Write-Host "Building with GCC..."
            gcc -o USBSTORServiceManager.exe USBSTORServiceManager.c -ladvapi32
            if (Test-Path .\USBSTORServiceManager.exe) { Rename-Item .\USBSTORServiceManager.exe USBSTORServiceManager-windows-amd64.exe }
          } else {
            Write-Error "No supported compiler found on runner"
          }

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-native
          path: USBSTORServiceManager-windows-amd64.exe


  # ─────────────────────────────────────────────
  # GITHUB RELEASE
  # Only runs after build passes
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-windows-native]
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: Download native Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-native
          path: dist

      - name: List files to publish
        run: ls -lh dist/

      - name: Install GitHub CLI
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gh

      - name: Create GitHub release and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          echo "Creating release $TAG for $REPO"
          gh auth setup-git || true
          gh release create "$TAG" dist/* --repo "$REPO" --title "Release $TAG" --notes "Automated release generated by GitHub Actions."
          echo "Release published: https://github.com/$REPO/releases/tag/$TAG"