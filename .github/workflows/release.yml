name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────
  # Windows — cross-compile desde Ubuntu con MinGW
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows (.exe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install MinGW
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64 make

      - name: Build
        run: make build-windows CC_WIN=x86_64-w64-mingw32-gcc

      - name: Verify artifact
        run: ls -lh *.exe || echo "No .exe file found!"

      - name: Upload
        uses: actions/upload-artifact@v4.6.2
        with:
          name: windows-build
          path: USBSTORServiceManager-windows-amd64.exe


  # ─────────────────────────────────────────────
  # Linux — compilación nativa
  # ─────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Install GCC
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc make

      - name: Build
        run: make build-linux

      - name: Verify artifact
        run: ls -lh USBSTORServiceManager* || echo "No binary found"

      - name: Upload
        uses: actions/upload-artifact@v4.6.2
        with:
          name: linux-build
          path: USBSTORServiceManager-linux-amd64


  # ─────────────────────────────────────────────
  # macOS — compilación nativa con clang
  # ─────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build
        run: make build-macos

      - name: Upload
        uses: actions/upload-artifact@v4.6.2
        with:
          name: macos-build
          path: USBSTORServiceManager-macos-universal


  # ─────────────────────────────────────────────
  # Release — solo corre si los 3 builds pasan
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos]
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Release ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows x64 | `USBSTORServiceManager-windows-amd64.exe` |
            | Linux x64   | `USBSTORServiceManager-linux-amd64`       |
            | macOS x64   | `USBSTORServiceManager-macos-universal`   |

            > Automated release generated by GitHub Actions.
          files: dist/*