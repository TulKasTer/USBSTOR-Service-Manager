name: Build and Release

on:
  push:
    tags:
      - 'v*'   # Triggered by tags like v1.0.0, v2.3.1, etc.

jobs:

  # ─────────────────────────────────────────────
  # TEST + BUILD (cross-compile Windows .exe from Linux)
  # ─────────────────────────────────────────────
  build-windows:
    name: 🪟 Build Windows (.exe)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Verify compiler
        run: x86_64-w64-mingw32-gcc --version

      - name: Build
        run: make

      - name: Test
        run: make test

      - name: Rename artifact
        run: mv USBSTORServiceManager.exe USBSTORServiceManager-windows-amd64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: USBSTORServiceManager-windows-amd64.exe


  # ─────────────────────────────────────────────
  # GITHUB RELEASE
  # Only runs after build passes
  # ─────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-windows
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist

      - name: List files to publish
        run: ls -lh dist/

      - name: Create Release and upload executable
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Release ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |---|---|
            | Windows x64 | `USBSTORServiceManager-windows-amd64.exe` |

            > Automated release generated by GitHub Actions.
          files: dist/*